name: Tea Bag CI Workflow

on: [ push, pull_request ]

jobs:

  Check:
    env:
      DEFAULT_BRANCH: master
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/wrapper
            ~/.android/avd/*
            ~/.android/adb*
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run static code analysis
        run: ./gradlew detekt --no-configuration-cache --no-daemon

  Android-emulator-tests:
    env:
      DEFAULT_BRANCH: master
    needs: Check
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/wrapper
            ~/.android/avd/*
            ~/.android/adb*
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'gradle'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run connected Android tests
        run: ./gradlew samples:app:pixel2api30DefaultDebugAndroidTest -Pandroid.testoptions.manageddevices.emulator.gpu="swiftshader_indirect" -Pandroid.experimental.testOptions.managedDevices.maxConcurrentDevices=1 --no-configuration-cache --no-daemon

  IOS-app-build:
    env:
      DEFAULT_BRANCH: master
    #needs: Check
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/wrapper
            ~/.android/avd/*
            ~/.android/adb*
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build IOS app
        uses: sersoft-gmbh/xcodebuild-action@v3
        with:
          project: samples/iosApp/iosApp.xcodeproj
          scheme: iosApp
          sdk: iphonesimulator
          configuration: Debug
          action: build

  Unit-tests:
    env:
      DEFAULT_BRANCH: master
    #needs: Check
    strategy:
      matrix:
        os: [ macos-26, ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/wrapper
            ~/.android/avd/*
            ~/.android/adb*
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run tests
        run: ./gradlew check -x detekt --no-configuration-cache --no-daemon
      - name: Archive test reports
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: tests-report-${{ matrix.os }}
          path: build/junit-reports/**

  Deploy:
    env:
      DEFAULT_BRANCH: master
    needs: [Unit-tests, IOS-app-build]
    runs-on: macos-26
    # tags should be of the form:
    # <no-value> -> dev build
    # v1.2.3-alpha1 -> alpha build
    # v1.2.3-rc1 or v1.2.3-alpha4-rc5 -> alpha RC
    # v1.2.3 -> stable
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/wrapper
            ~/.android/avd/*
            ~/.android/adb*
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Publish artifacts
        run: ./gradlew publishToSonatype closeSonatypeStagingRepository copyArtifacts --no-configure-on-demand --no-configuration-cache --no-daemon
        env:
          OSSRH_USER: ${{ secrets.OSSRH_USER }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          PUBLISH_PLUGIN_TOKEN: ${{ secrets.PUBLISH_PLUGIN_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: publish-artifacts
          path: build/artifacts/**